{% extends "base.html" %}
{% block title %}Change password · The Meat Ensemble{% endblock %}

{% block content %}
  <p><a href="{{ url_for('auth.profile') }}">← back to profile</a></p>
  <h1>Change password</h1>
  <form method="post" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>
      Current password
      <input type="password" name="current_password" required
             maxlength="256" autocomplete="current-password">
    </label>
    <label>
      New password
      <input type="password" name="new_password" required
             minlength="10" maxlength="256" autocomplete="new-password">
    </label>
    <label>
      Confirm new password
      <input type="password" name="confirm_password" required
             minlength="10" maxlength="256" autocomplete="new-password">
    </label>
    <div>
      <button type="submit">Change password</button>
      <a class="button secondary" href="{{ url_for('auth.profile') }}">Cancel</a>
    </div>
  </form>
{% endblock %}
