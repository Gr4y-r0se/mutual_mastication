# /etc/nginx/sites-available/meat_ensemble
# Symlink to enable: ln -s /etc/nginx/sites-available/meat_ensemble /etc/nginx/sites-enabled/
#
# Assumes gunicorn is running on a Unix socket:
#   gunicorn --workers 4 --bind unix:/run/meat_ensemble/app.sock \
#            --forwarded-allow-ips '*' app:app
#
# Set SECURE_COOKIES=1 in gunicorn's environment so Flask marks session
# cookies as Secure now that TLS is terminated here.

upstream meat_ensemble {
    server unix:/run/meat_ensemble/app.sock fail_timeout=0;
    # TCP alternative: server 127.0.0.1:9999 fail_timeout=0;
}

# ── Rate limiting ─────────────────────────────────────────────────────────��────
# Keyed on IP; 10 req/s sustained, bursts up to 20 before 429s are returned.
# Applied only to the login endpoint to complement the app's own lockout.
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # Allow Let's Encrypt HTTP-01 challenges through before redirecting.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name example.com;           # ← replace with your domain

    # ── TLS certificates ────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # ── TLS hardening (Mozilla Intermediate, Jan 2025) ──────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ─────────────────────────────────────────────────────────
    # HSTS: the app doesn't set this itself, so nginx owns it.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # The remaining headers (X-Frame-Options, CSP, etc.) are already set by the
    # Flask after_request hook — do not duplicate them here or browsers receive
    # the header twice.

    # ── Request limits ───────────────────────────────────────────────────────────
    client_max_body_size  64k;     # mirrors MAX_CONTENT_LENGTH in Flask
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          30s;

    # ── Logging ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/meat_ensemble.access.log;
    error_log  /var/log/nginx/meat_ensemble.error.log warn;

    # ── Static files served directly by nginx ───────────────────────────────────
    # Flask's default static folder; add more location blocks if you introduce
    # a CDN or a /static build pipeline later.
    location /static/ {
        alias   /path/to/mutual_mastication/static/;   # ← set absolute path
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Login: extra rate-limit on top of the app's own lockout ─────────────────
    location = /login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://meat_ensemble;
        proxy_redirect     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All other requests ───────────────────────────────────────────────────────
    location / {
        proxy_pass         http://meat_ensemble;
        proxy_redirect     off;

        # These map to ProxyFix(x_proto=1, x_host=1) already configured in app.py.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering for SSE/streaming if you add it later.
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}
